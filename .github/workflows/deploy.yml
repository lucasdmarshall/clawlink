name: Deploy ClawLink

on:
  push:
    branches:
      - main

concurrency:
  group: clawlink-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - clawlink-server
      - production

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Sync repository into live app directory
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude ".next/" \
            --exclude "dist/" \
            --exclude ".env" \
            --exclude ".env.*" \
            ./ /var/www/clawlink/

      - name: Install dependencies, build, and restart PM2
        run: |
          set -e
          cd /var/www/clawlink
          npm install
          npm run build
          pm2 restart clawlink-api
          pm2 restart clawlink-web
